      - 4.1. Datastation: applicatie/data-station.md
      - 4.2. Catalogus: applicatie/catalogus.md
      - 4.3. DAAMS: applicatie/daams.md
      - 4.4. Processing hub: applicatie/processing-hub.md
      - 4.5. Federatieve analyse: applicatie/federatieve-analyse.md
      - 4.6. Federatief leren: applicatie/federatief-leren.md
      - 4.7. Data pooling: applicatie/data-pooling.md
  - 5. Infrastructuur:
      - infrastructuur/index.md
      - infrastructuur/evolutie.md
