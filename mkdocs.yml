      - infrastructuur/standaarden.md
  - 6. Implementaties:
    - implementaties/index.md
    - 6.1. KIK-V:
      - implementaties/KIK-V/index.md
      - 6.1.1. Proces: implementaties/KIK-V/proces.md
      - 6.1.2. Informatie: implementaties/KIK-V/informatie.md
      - 6.1.3. Applicatie: implementaties/KIK-V/applicatie.md
      - 6.1.4. Infrastructuur: implementaties/KIK-V/infrastructuur.md
    - 6.2. PLUGIN:
      - implementaties/PLUGIN/index.md
      - 6.2.1. Proces: implementaties/PLUGIN/proces.md
      - 6.2.2. Informatie: implementaties/PLUGIN/informatie.md
      - 6.2.3. Applicatie: implementaties/PLUGIN/applicatie.md
      - 6.2.4. Infrastructuur: implementaties/PLUGIN/infrastructuur.md
    # - 6.3. DataSHIELD:
    #   - implementaties/DataSHIELD/index.md
    #   - Informatie: implementaties/DataSHIELD/informatie.md
    #   - Applicatie: implementaties/DataSHIELD/applicatie.md
  - 7. Discussie:
    - discussie/index.md
    - 7.1. Centraal vs. decentraal: discussie/centraal-vs-decentraal.md    
    - 7.2. Primair vs. secundair: discussie/primair-vs-secundair.md    
    - 7.3. Permit vs. request: discussie/permit-vs-request.md
    - 7.4. Dataspace initiatieven: discussie/dataspace-initiatieven.md
    - 7.5. Voorstel ontwikkelagenda: discussie/ontwikkelagenda.md
    
  - Appendix:
    - appendix/index.md
    - Archimate data space: https://health-ri.github.io/data-spaces-archimate/
    - TEHDAS2 requirements: appendix/tehdas2-requirements.md
