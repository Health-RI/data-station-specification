site_name: Datastations voor secundair gebruik in de zorg
site_url: https://health-ri.github.io/data-station-specification
repo_url: https://github.com/Health-RI/data-station-specification
theme:
  name: material
  language: 'nl'
  custom_dir: overrides
  font:
    text: Fira Sans
    code: Fira Code
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  palette:
    primary: custom
    accent: custom
  features:
    - content.tooltips
    - header.autohide
    - navigation.footer
    - navigation.indexes
    - navigation.instant.preview
    - navigation.top
    - navigation.tracking
    # - navigation.path
    # - toc.integrate
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      auto_append:
        - includes/woordenlijst.md
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      title: Op deze pagina
plugins:
  - bibtex:
      bib_file: "data-station-specification.bib"
  - glightbox
  - i18n:
      docs_structure: suffix
      languages:
        - locale: nl
          name: Nederlands
          build: true
          default: true
        - locale: en
          name: English
          build: true
          site_name: Datastations for secondary use of health data
          nav_translations:
            # Top-level numbered sections
            1. Inleiding: 1. Introduction
            2. Proces: 2. Process
            3. Informatie: 3. Information
            4. Applicatie: 4. Application
            5. Infrastructuur: 5. Infrastructure
            6. Implementaties: 6. Implementations
            7. Discussie: 7. Discussion

            # Introduction sections
            Datastations voor secundair gebruik in de zorg: Data station for secondary use of health data
            Inleiding: Introduction
            Scope van de specificatie: Scope of the specification
            Datastations als basis voor interoperabiliteit: Data stations as cornerstone for interoperability
            Leeswijzer: Reader's guide

            # Process sub-sections
            2.1. Data zoeken en vinden: 2.1. Finding data
            2.2. Data aanvragen: 2.2. Requesting data
            2.3. Data klaarzetten: 2.3. Preparing data
            2.4. Data analyseren: 2.4. Analysing data
            2.5. Resultaten publiceren: 2.5. Publishing results

            # Application sub-sections
            4.1. Datastation: 4.1. Data station
            4.2. Catalogus: 4.2. Catalogue
            4.3. DAAMS: 4.3. DAAMS
            4.4. Processing hub: 4.4. Processing hub
            4.5. Federatieve analyse: 4.5. Federated analysis
            4.6. Federatief leren: 4.6. Federated learning
            4.7. Data pooling: 4.7. Data pooling

            # Discussion sub-sections
            7.1. Centraal vs. decentraal: 7.1. Centralised vs. decentralised
            7.2. Primair vs. secundair: 7.2. Primary vs. secondary
            7.3. Permit vs. request: 7.3. Permit vs. request
            7.4. Dataspace initiatieven: 7.4. Dataspace initiatives
            7.5. Voorstel ontwikkelagenda: 7.5. Proposed development agenda

            # Implementations sub-sections
            6.1. KIK-V: 6.1. KIK-V
            6.1.1. Proces: 6.1.1. Process
            6.1.2. Informatie: 6.1.2. Information
            6.1.3. Applicatie: 6.1.3. Application
            6.1.4. Infrastructuur: 6.1.4. Infrastructure
            6.2. PLUGIN: 6.2. PLUGIN
            6.2.1. Proces: 6.2.1. Process
            6.2.2. Informatie: 6.2.2. Information
            6.2.3. Applicatie: 6.2.3. Application
            6.2.4. Infrastructuur: 6.2.4. Infrastructure

            # main sections (legacy / used in page titles)
            Architectuur: Architecture
            Functionele componenten: Functional components
            Implementaties: Implementations

            # sub-sections
            Motivatie: Motivation
            Principes: Principles
            Standaarden: Standards
            Datastation: Datastation
            Federatief netwerk: Federated network
            PLUGIN: PLUGIN
            KIK-V: KIK-V
  - meta
  - mkdocs-pdf
  - mkdocs-video
  - search
  - plantuml:
      puml_url: https://www.plantuml.com/plantuml/
      theme:
        light: kanagawa/fuji
        dark: kanagawa/wave
extra:
  alternate:
    - name: Nederlands
      link: /
      lang: nl
    - name: English
      link: /en/
      lang: en
hooks:
  - hooks.py
watch:
  - includes

# Page tree
nav:
  - 1. Inleiding:
    - index.md
    - waarom.md
    - data-stations-als-hoeksteen.md
    - leeswijzer.md
  - 2. Proces:
    - proces/index.md
    - 2.1. Data zoeken en vinden: proces/vinden.md
    - 2.2. Data aanvragen: proces/aanvragen.md
    - 2.3. Data klaarzetten: proces/klaarzetten.md
    - 2.4. Data analyseren: proces/analyseren.md
    - 2.5. Resultaten publiceren: proces/publiceren.md
  - 3. Informatie:
      - informatie/index.md
      - informatie/syntactisch.md
      - informatie/semantisch.md
